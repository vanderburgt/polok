{% extends "base.html" %}
{% block title %}Kaart - Polok{% endblock %}
{% block content %}
<style>
    .map-container { background: var(--white); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; position: relative; }
    .map-svg { width: 100%; height: auto; display: block; }
    .map-svg path { stroke: var(--white); stroke-width: 0.3; transition: opacity 0.15s; }
    .map-svg path:hover { opacity: 0.85; stroke: var(--text); stroke-width: 0.8; }
    .map-tooltip {
        position: absolute; pointer-events: none; background: var(--white); border: 1px solid var(--border);
        border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.8125rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        display: none; z-index: 10; white-space: nowrap;
    }
    .map-tooltip strong { font-weight: 600; }
    .map-legend { display: flex; gap: 0.25rem; align-items: center; margin-top: 1rem; font-size: 0.8125rem; color: var(--text-muted); }
    .map-legend-bar { display: flex; align-items: center; gap: 0; }
    .map-legend-swatch { width: 28px; height: 14px; }
    .map-legend-swatch:first-child { border-radius: 3px 0 0 3px; }
    .map-legend-swatch:last-child { border-radius: 0 3px 3px 0; }
    .map-legend-label { font-size: 0.75rem; color: var(--text-muted); padding: 0 0.4rem; }
</style>

<h1 data-t="kaart">Kaart</h1>
<p class="subtitle">Dekking van gevonden verkiezingsprogramma's per gemeente. Donkerder blauw = hogere dekking.</p>

<div class="map-container" id="map-container">
    <div class="map-tooltip" id="map-tooltip">
        <strong id="tt-name"></strong><br>
        <span id="tt-status"></span>
    </div>
    <div id="map-loading" style="padding:3rem;text-align:center;color:var(--text-muted)">Kaart laden...</div>
</div>

<div class="map-legend">
    <span class="map-legend-label">0%</span>
    <div class="map-legend-bar" id="legend-bar"></div>
    <span class="map-legend-label">100%</span>
    <span style="margin-left:0.75rem">Dekking programma's per gemeente</span>
</div>

<script>
function coverageColor(ratio) {
    // 0 = light grey, 1 = deep blue, with intermediate shades
    if (ratio <= 0) return '#e0e0ee';
    // Interpolate from light blue to deep blue
    var stops = [
        [0.01, 0.82, 0.88, 0.98],  // very light blue
        [0.25, 0.65, 0.72, 0.96],
        [0.50, 0.45, 0.50, 0.92],
        [0.75, 0.28, 0.32, 0.88],
        [1.00, 0.22, 0.22, 0.98],  // deep blue (#3737fa)
    ];
    var r, g, b;
    for (var i = 1; i < stops.length; i++) {
        if (ratio <= stops[i][0]) {
            var t = (ratio - stops[i-1][0]) / (stops[i][0] - stops[i-1][0]);
            r = Math.round((stops[i-1][1] + t * (stops[i][1] - stops[i-1][1])) * 255);
            g = Math.round((stops[i-1][2] + t * (stops[i][2] - stops[i-1][2])) * 255);
            b = Math.round((stops[i-1][3] + t * (stops[i][3] - stops[i-1][3])) * 255);
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        }
    }
    r = Math.round(stops[stops.length-1][1] * 255);
    g = Math.round(stops[stops.length-1][2] * 255);
    b = Math.round(stops[stops.length-1][3] * 255);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// Build legend gradient
(function() {
    var bar = document.getElementById('legend-bar');
    for (var i = 0; i <= 10; i++) {
        var swatch = document.createElement('div');
        swatch.className = 'map-legend-swatch';
        swatch.style.background = coverageColor(i / 10);
        bar.appendChild(swatch);
    }
})();

async function loadMap() {
    var geoRes = fetch('/static/gemeenten.json');
    var statusRes = fetch('/_data/gemeenten/status');
    var geo = await (await geoRes).json();
    var statusList = await (await statusRes).json();

    var statusMap = {};
    statusList.forEach(function(s) { statusMap[s.code] = s; });

    // Bounding box
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    geo.features.forEach(function(f) {
        var coords = f.geometry.type === 'MultiPolygon' ? f.geometry.coordinates : [f.geometry.coordinates];
        coords.forEach(function(poly) { poly.forEach(function(ring) {
            ring.forEach(function(p) {
                if (p[0] < minX) minX = p[0]; if (p[0] > maxX) maxX = p[0];
                if (p[1] < minY) minY = p[1]; if (p[1] > maxY) maxY = p[1];
            });
        }); });
    });

    // Correct aspect ratio: at ~52N latitude, 1 degree lon ≈ 0.6 degrees lat in distance
    var latCorrection = Math.cos((minY + maxY) / 2 * Math.PI / 180);
    var geoW = (maxX - minX) * latCorrection;
    var geoH = maxY - minY;

    var svgW = 600, pad = 10;
    var scale = (svgW - 2 * pad) / geoW;
    var svgH = geoH * scale + 2 * pad;

    function project(lon, lat) {
        return [(lon - minX) * latCorrection * scale + pad, (maxY - lat) * scale + pad];
    }
    function ringToPath(ring) {
        return ring.map(function(p, i) {
            var pt = project(p[0], p[1]);
            return (i === 0 ? 'M' : 'L') + pt[0].toFixed(1) + ',' + pt[1].toFixed(1);
        }).join('') + 'Z';
    }

    var NS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('viewBox', '0 0 ' + svgW + ' ' + svgH);
    svg.setAttribute('class', 'map-svg');

    geo.features.forEach(function(f) {
        var code = f.properties.c;
        var name = f.properties.n;
        var status = statusMap[code];
        var dekking = status ? status.dekking : 0;
        var totaal = status ? status.totaal_partijen : 0;
        var met = status ? status.met_programma : 0;

        var d = '';
        var coords = f.geometry.type === 'MultiPolygon' ? f.geometry.coordinates : [f.geometry.coordinates];
        coords.forEach(function(poly) { poly.forEach(function(ring) { d += ringToPath(ring); }); });

        var path = document.createElementNS(NS, 'path');
        path.setAttribute('d', d);
        path.style.fill = coverageColor(dekking);
        path.setAttribute('data-name', name);
        path.setAttribute('data-dekking', dekking);
        path.setAttribute('data-met', met);
        path.setAttribute('data-totaal', totaal);
        svg.appendChild(path);
    });

    var container = document.getElementById('map-container');
    document.getElementById('map-loading').style.display = 'none';
    container.appendChild(svg);

    var tooltip = document.getElementById('map-tooltip');
    var ttName = document.getElementById('tt-name');
    var ttStatus = document.getElementById('tt-status');

    svg.addEventListener('mousemove', function(e) {
        var target = e.target;
        if (target.tagName !== 'path') { tooltip.style.display = 'none'; return; }
        ttName.textContent = target.getAttribute('data-name');
        var met = target.getAttribute('data-met');
        var totaal = target.getAttribute('data-totaal');
        var dekking = Math.round(parseFloat(target.getAttribute('data-dekking')) * 100);
        ttStatus.textContent = met + ' / ' + totaal + ' partijen (' + dekking + '%)';
        var rect = container.getBoundingClientRect();
        var x = e.clientX - rect.left + 12;
        var y = e.clientY - rect.top - 10;
        if (x + 200 > rect.width) x = e.clientX - rect.left - 200;
        tooltip.style.left = x + 'px';
        tooltip.style.top = y + 'px';
        tooltip.style.display = 'block';
    });
    svg.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });
}

loadMap();
</script>
{% endblock %}
