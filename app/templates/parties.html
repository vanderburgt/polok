{% extends "base.html" %}
{% block title %}Partijen - Polok{% endblock %}
{% block content %}
<h1 data-t="partijen">Partijen</h1>
<p class="subtitle">Alle partijen die deelnemen aan de gemeenteraadsverkiezingen 2026.</p>

<div class="filters">
    <div class="filter-group">
        <label data-t="naam">Naam</label>
        <input type="text" id="filter-name" data-t-placeholder="zoeken" placeholder="Zoeken" style="width:12rem">
    </div>
    <div class="filter-group">
        <label data-t="gemeente">Gemeente</label>
        <input type="text" id="filter-municipality" placeholder="Gemeente" style="width:12rem">
    </div>
    <div class="filter-group">
        <label data-t="landelijke_partij">Landelijke partij</label>
        <select id="filter-national">
            <option value="" data-t="alle">Alle</option>
            <option value="lokaal" data-t="lokale_partij">Lokale partij</option>
            {% for np in national_parties %}
            <option value="{{ np.name }}">{{ np.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="filter-group">
        <label data-t="heeft_programma">Heeft programma</label>
        <select id="filter-has-program">
            <option value="" data-t="alle">Alle</option>
            <option value="true" data-t="ja">Ja</option>
            <option value="false">Nee</option>
        </select>
    </div>
    <div class="filter-group">
        <label data-t="per_pagina">Per pagina</label>
        <select id="filter-perpage">
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="250">250</option>
        </select>
    </div>
    <button onclick="currentPage=1;loadParties()" class="filter-btn" data-t="filter">Filteren</button>
</div>

<div id="pagination-top" class="pag"></div>

<div class="table-wrap">
    <table id="party-table">
        <thead><tr>
            <th data-t="partij">Partij</th>
            <th data-t="gemeente">Gemeente</th>
            <th data-t="landelijke_partij">Landelijke partij</th>
            <th data-t="website">Website</th>
            <th data-t="programma">Programma</th>
        </tr></thead>
        <tbody id="parties-body"></tbody>
    </table>
</div>

<div id="pagination-bottom" class="pag"></div>

<script>
var currentPage = 1;
var currentData = [];
function clearEl(el) { while (el.firstChild) el.removeChild(el.firstChild); }
function cel(text) { var td = document.createElement('td'); td.textContent = text; return td; }

function renderPag(container, total, page, perPage, totalPages) {
    clearEl(container);
    if (total === 0) return;
    var s = document.createElement('span');
    s.textContent = t('tonen') + ' ' + ((page-1)*perPage+1) + '-' + Math.min(page*perPage, total) + ' ' + t('van') + ' ' + total;
    container.appendChild(s);
    if (totalPages <= 1) return;
    var prev = document.createElement('button'); prev.textContent = t('vorige'); prev.disabled = page<=1;
    prev.onclick = function(){currentPage=page-1;loadParties();}; container.appendChild(prev);
    var pi = document.createElement('span'); pi.textContent = t('pagina')+' '+page+'/'+totalPages; container.appendChild(pi);
    var next = document.createElement('button'); next.textContent = t('volgende'); next.disabled = page>=totalPages;
    next.onclick = function(){currentPage=page+1;loadParties();}; container.appendChild(next);
}

function truncateUrl(url) {
    try { var u=new URL(url); var d=u.hostname.replace(/^www\./,''); if(u.pathname&&u.pathname!=='/') d+=u.pathname.replace(/\/$/,''); return d.length>35?d.substring(0,32)+'...':d; } catch(e){return url;}
}

function renderRows(rows) {
    var tbody = document.getElementById('parties-body'); clearEl(tbody);
    rows.forEach(function(r){
        var tr = document.createElement('tr');
        var nc = cel(r[0]);
        if(r[5]){ var b=document.createElement('span'); b.style.cssText='font-size:0.6875rem;color:var(--text-muted);margin-left:4px'; b.textContent='('+t('coalitie')+')'; nc.appendChild(b); }
        tr.appendChild(nc);
        tr.appendChild(cel(r[1]));
        tr.appendChild(cel(r[2]||'-'));

        var wc = document.createElement('td');
        if(r[3]){
            var a=document.createElement('a'); a.href=r[3]; a.target='_blank'; a.rel='noopener noreferrer';
            a.textContent=truncateUrl(r[3]); a.title=r[3]; wc.appendChild(a);
        } else { wc.textContent='-'; }
        tr.appendChild(wc);

        var pc = document.createElement('td');
        if(r[4]){ var s=document.createElement('span'); s.style.color='var(--green)'; s.style.fontWeight='600'; s.textContent=t('ja'); pc.appendChild(s); }
        else { pc.textContent='-'; }
        tr.appendChild(pc);

        tbody.appendChild(tr);
    });
}

async function loadParties() {
    var params = new URLSearchParams({pagina:currentPage, per_pagina:document.getElementById('filter-perpage').value});
    var n=document.getElementById('filter-name').value.trim(); if(n) params.set('zoek',n);
    var m=document.getElementById('filter-municipality').value.trim(); if(m) params.set('gemeente',m);
    var np=document.getElementById('filter-national').value; if(np) params.set('landelijke_partij',np);
    var hp=document.getElementById('filter-has-program').value; if(hp) params.set('heeft_programma',hp);

    var data = await (await fetch('/_data/partijen?'+params)).json();
    var pp = parseInt(document.getElementById('filter-perpage').value);
    renderPag(document.getElementById('pagination-top'), data.totaal, data.pagina, pp, data.totaal_paginas);
    renderPag(document.getElementById('pagination-bottom'), data.totaal, data.pagina, pp, data.totaal_paginas);

    currentData = data.partijen.map(function(p){
        return [p.naam, p.gemeente, p.landelijke_partij, p.website, p.heeft_programma, p.is_coalitie];
    });
    renderRows(currentData);
    makeTableSortable('party-table', currentData, renderRows);
}

function onLangChange(){ loadParties(); updateLangUI(); }
document.getElementById('filter-name').addEventListener('keydown',function(e){ if(e.key==='Enter'){currentPage=1;loadParties();}});
document.getElementById('filter-municipality').addEventListener('keydown',function(e){ if(e.key==='Enter'){currentPage=1;loadParties();}});
loadParties();
</script>
{% endblock %}
